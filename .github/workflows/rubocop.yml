name: Rubocop

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  rubocop:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Lint Ruby code with RuboCop
        run: |
          bundle exec rubocop
